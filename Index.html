<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nazwa Twojej Strony CS2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <main class="main-content">
            <header class="header">
                <h1>NAZWA</h1>
            </header>
            
            <section class="card">
                <h2>Turnieje i Rozgrywki</h2>
                <p>Tutaj wrzucisz info o nadchodzących meczach, drabinki itd.</p>
            </section>

            <section class="card">
                <h2>Lista Graczy, którzy wzięli udział</h2>
                <ul>
                    <li>Player1 - 1.6 K/D</li>
                    <li>Player2 - 1.2 K/D</li>
                    <li>Player3 - 0.9 K/D</li>
                </ul>
            </section>
        </main>

        <aside class="sidebar">
            <h3>Discord</h3>
            <div class="discord-embed">
                <!-- Tu wklejasz kod widgetu z discorda -->
                <iframe src="https://discord.com/widget?id=TWOJE_ID_SERWERA&theme=dark" 
                        width="100%" 
                        height="500" 
                        allowtransparency="true" 
                        frameborder="0">
                </iframe>
            </div>
        </aside>
    </div>
</body>
</html>
